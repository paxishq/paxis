#cloud-config

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - git
  - ca-certificates
  - postgresql
  - postgresql-contrib
  - libcap2-bin

users:
  - name: paxis
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGWZbGQPJCFk1i7ljrt/MbWvZATkSKKzJz8nksd0OebK github@oheriko.com
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEbns6qvegkBOwPiU/yVZQ0zBlhKNS3Py73TbTB6SzWU ericmuckley@gmail.com

write_files:
  - path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 10
      AllowUsers paxis

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = false

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

  - path: /etc/sysctl.d/99-hardening.conf
    content: |
      net.ipv4.tcp_syncookies = 1
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      kernel.randomize_va_space = 2

  - path: /home/paxis/deploy-key.sh
    owner: paxis:paxis
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      if [ "$EUID" -eq 0 ]; then
        echo "Run as the paxis user, not root." && exit 1
      fi
      if [ -f ~/.ssh/github_deploy ]; then
        echo "Deploy key already exists:"; cat ~/.ssh/github_deploy.pub; exit 0
      fi
      echo ">>> Generating GitHub deploy key..."
      ssh-keygen -t ed25519 -C "paxis-server-deploy" -f ~/.ssh/github_deploy -N ""
      cat > ~/.ssh/config << 'SSHCONFIG'
      Host github-paxis
        HostName github.com
        IdentityFile ~/.ssh/github_deploy
        IdentityOnly yes
        StrictHostKeyChecking accept-new
      SSHCONFIG
      chmod 600 ~/.ssh/config
      echo ""; echo "Add this deploy key to github.com/paxishq/paxis -> Settings -> Deploy keys:"
      echo ""; cat ~/.ssh/github_deploy.pub; echo ""
      read -p "Press ENTER once the deploy key has been added to GitHub..."
      ssh -T git@github-paxis || true
      echo "Deploy key setup complete."

  - path: /etc/caddy/Caddyfile
    owner: root:root
    permissions: '0644'
    content: |
      {
        acme_dns cloudflare {env.CF_API_TOKEN}
      }

      getpaxis.com {
        reverse_proxy unix//run/paxis/app.sock
      }

      mcp.getpaxis.com {
        reverse_proxy unix//run/paxis/mcp.sock
      }

  - path: /etc/caddy/env
    owner: root:root
    permissions: '0600'
    content: |
      CF_API_TOKEN=PLACEHOLDER

  - path: /etc/systemd/system/caddy.service.d/env.conf
    content: |
      [Service]
      EnvironmentFile=/etc/caddy/env

runcmd:
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - sysctl -p /etc/sysctl.d/99-hardening.conf
  - systemctl restart sshd
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - systemctl enable unattended-upgrades
  - curl -fsSL "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2Fcloudflare" -o /usr/bin/caddy
  - chmod +x /usr/bin/caddy
  - groupadd --system caddy
  - useradd --system --gid caddy --create-home --home-dir /var/lib/caddy --shell /usr/sbin/nologin --comment "Caddy web server" caddy
  - chown caddy:caddy /etc/caddy/Caddyfile
  - chown caddy:caddy /etc/caddy/env
  - curl -fsSL https://raw.githubusercontent.com/caddyserver/dist/master/init/caddy.service -o /etc/systemd/system/caddy.service
  - systemctl daemon-reload
  - systemctl enable caddy
