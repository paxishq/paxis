services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paxis
      POSTGRES_PASSWORD: paxis
      POSTGRES_DB: paxis
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "15151:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paxis -d paxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: paxis
      POSTGRES_PASSWORD: paxis
      POSTGRES_DB: paxis_test
    ports:
      - "15152:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paxis -d paxis_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: oven/bun:latest
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - bun_cache:/root/.bun
    ports:
      - "15150:15150"
    environment:
      DATABASE_URL: postgres://paxis:paxis@db:5432/paxis
      PORT: 15150
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-do-not-use-in-production}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL:-mistralai/Mistral-Small-3.2-24B-Instruct-2506}
      NODE_ENV: development
    command: sh -c "bun install --frozen-lockfile && bun run --hot src/index.ts"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  bun_cache:
